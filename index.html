<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
    <meta name="theme-color" content="#0c1017">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- FIX #10: закрыто от индексации, canonical для веб-версии -->
    <meta name="robots" content="noindex, nofollow">
    <title>Amigo Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c1017;
            --nav-bg: #11151d;
            --nav-border: #1f242c;
            --text-muted: #576575;
            --accent: #2962ff;
            --app-height: 100vh;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: calc(48px + var(--safe-bottom));
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--nav-bg) !important;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: var(--app-height);
            min-height: var(--app-height);
            max-height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
        }

        .window-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: calc(var(--app-height) - var(--nav-height));
            background-color: var(--bg-color);
            overflow: hidden;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            /* Убираем transition на visibility чтобы hidden iframe не блокировал события */
            transition: opacity 0.2s ease-in-out;
            background-color: var(--bg-color);
        }

        iframe.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        nav {
            position: absolute;
            top: calc(var(--app-height) - var(--nav-height));
            left: 0;
            right: 0;
            height: var(--nav-height);
            padding-bottom: var(--safe-bottom);
            background: rgba(17, 21, 29, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--nav-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            z-index: 10;
            gap: 4px;
        }

        .nav-tab {
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s, transform 0.1s;
            max-width: 120px;
        }

        .nav-tab:active {
            transform: scale(0.95);
        }

        .nav-tab.active {
            color: var(--accent);
        }

        .nav-tab svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-tab.active svg {
            transform: translateY(-2px);
        }

        /* FIX #8: error state overlay */
        .iframe-error {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            gap: 12px;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .iframe-error.visible {
            display: flex;
        }

        .iframe-error svg {
            width: 40px;
            height: 40px;
            fill: var(--text-muted);
            opacity: 0.5;
        }

        .iframe-error button {
            margin-top: 8px;
            padding: 8px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* FIX #8: loading spinner */
        .iframe-loader {
            display: flex;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            transition: opacity 0.3s;
        }

        .iframe-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--nav-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="window-container">

        <!-- Loaders -->
        <div id="loader-crypto" class="iframe-loader">
            <div class="spinner"></div>
        </div>
        <div id="loader-note" class="iframe-loader">
            <div class="spinner"></div>
        </div>

        <!-- Error states -->
        <div id="error-crypto" class="iframe-error">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>Terminal unavailable</span>
            <button onclick="reloadIframe('crypto')">Retry</button>
        </div>
        <div id="error-note" class="iframe-error">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>Notepad unavailable</span>
            <button onclick="reloadIframe('note')">Retry</button>
        </div>

        <!--
            FIX #3: добавлены allow-top-navigation-by-user-activation allow-modals
            FIX #6: убран loading="lazy" — он блокировал загрузку невидимых iframe.
                    Используем eager чтобы оба фрейма грузились сразу в фоне.
        -->
        <iframe id="win-crypto"
                class="active"
                loading="eager"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation-by-user-activation allow-modals allow-downloads"
                allow="clipboard-read; clipboard-write"></iframe>

        <iframe id="win-note"
                loading="eager"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation-by-user-activation allow-modals allow-downloads allow-storage-access"
                allow="clipboard-read; clipboard-write"></iframe>
        <!-- FIX #5: allow-storage-access добавлен для Notepad (localStorage/IndexedDB) -->

    </div>

    <nav>
        <button id="btn-crypto" class="nav-tab active" onclick="switchWindow('crypto', this)">
            <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L3 15.17l1.5 1.32z"/></svg>
            <span id="text-crypto">Terminal</span>
        </button>

        <button id="btn-note" class="nav-tab" onclick="switchWindow('note', this)">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span id="text-note">Notepad</span>
        </button>
    </nav>

    <script>
        // FIX #1: имя репо с опечаткой (terninal) — URL оставляем как есть,
        // т.к. репо реально так называется. Задокументировано для будущего rename.
        const APP_URLS = {
            crypto: "https://usalabama.github.io/amigocryptoterminal/",
            note: "https://usalabama.github.io/amigo-note/"
        };

        let tg = null;
        let userLang = 'en';
        let layoutFrozen = false;

        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // FIX #9: setHeaderColor / setBackgroundColor принимают только
            // 'bg_color' | 'secondary_bg_color' в новом API (Bot API 7.0+).
            // Для обратной совместимости — try/catch оба варианта.
            try {
                tg.setHeaderColor('bg_color');
                tg.setBackgroundColor('#0c1017');
            } catch (e) {
                // старый клиент — игнорируем
            }

            if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

            // FIX #7: парсим подязыки типа "ru-RU" → "ru"
            if (tg.initDataUnsafe?.user?.language_code) {
                userLang = tg.initDataUnsafe.user.language_code.toLowerCase().split('-')[0];
            }
        }

        // FIX #2: freezeAppLayout через viewportChanged event вместо голого setTimeout.
        // Используем viewportStableHeight — он доступен после tg.expand().
        // Двойной fallback: event + setTimeout 600ms.
        function freezeAppLayout() {
            if (layoutFrozen) return;

            const doFreeze = () => {
                if (layoutFrozen) return;
                layoutFrozen = true;
                const h = (tg && tg.viewportStableHeight && tg.viewportStableHeight > 100)
                    ? tg.viewportStableHeight
                    : window.innerHeight;
                document.documentElement.style.setProperty('--app-height', `${h}px`);
            };

            if (tg) {
                // Слушаем стабилизацию viewport после expand()
                const onViewport = ({ isStateStable }) => {
                    if (isStateStable) {
                        tg.offEvent('viewportChanged', onViewport);
                        doFreeze();
                    }
                };
                tg.onEvent('viewportChanged', onViewport);
                // Fallback: если событие не пришло за 600ms — снимаем как есть
                setTimeout(doFreeze, 600);
            } else {
                // Веб-режим — просто берём innerHeight
                doFreeze();
            }
        }

        const i18n = {
            uk: { crypto: "Термінал", note: "Блокнот" },
            ru: { crypto: "Терминал", note: "Блокнот" },
            en: { crypto: "Terminal", note: "Notepad" }
        };

        const t = i18n[userLang] || i18n['en'];

        // FIX #8: обработчики загрузки и ошибок iframe
        function setupIframeHandlers(id) {
            const frame = document.getElementById(`win-${id}`);
            const loader = document.getElementById(`loader-${id}`);
            const errorEl = document.getElementById(`error-${id}`);

            frame.addEventListener('load', () => {
                loader.classList.add('hidden');
                errorEl.classList.remove('visible');
            });

            frame.addEventListener('error', () => {
                loader.classList.add('hidden');
                errorEl.classList.add('visible');
            });

            // Timeout fallback: если iframe завис — показываем ошибку через 15с
            const loadTimeout = setTimeout(() => {
                if (!loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    errorEl.classList.add('visible');
                }
            }, 15000);

            frame.addEventListener('load', () => clearTimeout(loadTimeout), { once: true });
        }

        function reloadIframe(id) {
            const frame = document.getElementById(`win-${id}`);
            const loader = document.getElementById(`loader-${id}`);
            const errorEl = document.getElementById(`error-${id}`);
            errorEl.classList.remove('visible');
            loader.classList.remove('hidden');
            frame.src = APP_URLS[id];
        }

        window.addEventListener('DOMContentLoaded', () => {
            freezeAppLayout();

            document.getElementById('text-crypto').innerText = t.crypto;
            document.getElementById('text-note').innerText = t.note;

            setupIframeHandlers('crypto');
            setupIframeHandlers('note');

            // Грузим оба iframe сразу (FIX #6 — eager loading)
            // Небольшой сдвиг для note чтобы не конкурировали за полосу
            document.getElementById('win-crypto').src = APP_URLS.crypto;
            setTimeout(() => {
                document.getElementById('win-note').src = APP_URLS.note;
            }, 400);
        });

        function switchWindow(windowId, btn) {
            if (btn.classList.contains('active')) return;

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            document.querySelectorAll('iframe').forEach(frame => frame.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));

            document.getElementById(`win-${windowId}`).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
