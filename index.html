<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ключевое: interactive-widget=resizes-content — разрешает клавиатуре изменять viewport, но мы это обойдём -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#0c1017">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Amigo Hub — Terminal & Notepad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Корневая фиксация: body имеет жёсткую высоту (управляется через JS), которая НЕ меняется при появлении клавиатуры */
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c1017;
        }

        body {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c1017;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер для iframe: занимает всё пространство от верха до навигации */
        .window-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 56px;          /* стандартная высота навигации, будет уточнена через JS и переменную */
            overflow: hidden;
            background-color: #0c1017;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            background-color: #0c1017;
        }

        iframe.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* Навигация всегда внизу body (абсолютное позиционирование) — не поднимается вместе с клавиатурой */
        nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(17, 21, 29, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #1f242c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 20;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            box-sizing: content-box;
        }

        .nav-tab {
            flex: 1;
            max-width: 130px;
            height: 100%;
            background: none;
            border: none;
            color: #8e9eae;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            border-radius: 12px;
        }

        .nav-tab:active {
            transform: scale(0.96);
        }

        .nav-tab.active {
            color: #3b82f6;
        }

        .nav-tab svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-tab.active svg {
            transform: translateY(-2px);
        }

        /* Запрет скролла страницы */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="window-container" id="windowContainer">
    <iframe id="win-crypto" class="active"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"
            title="Crypto Terminal"
            loading="eager"></iframe>

    <iframe id="win-note"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"
            title="Secure Notepad"
            loading="lazy"></iframe>
</div>

<nav>
    <button id="btn-crypto" class="nav-tab active" data-window="crypto">
        <svg viewBox="0 0 24 24">
            <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L3 15.17l1.5 1.32z"/>
        </svg>
        <span id="text-crypto">Terminal</span>
    </button>
    <button id="btn-note" class="nav-tab" data-window="note">
        <svg viewBox="0 0 24 24">
            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
        </svg>
        <span id="text-note">Notepad</span>
    </button>
</nav>

<script>
    (function() {
        // ---- РАДИКАЛЬНОЕ РЕШЕНИЕ: ФИКСИРОВАННАЯ ВЫСОТА BODY, ИГНОРИРУЮЩАЯ КЛАВИАТУРУ ----
        // При открытии клавиатуры window.innerHeight уменьшается, но мы НЕ обновляем высоту body,
        // благодаря чему навигация (position: absolute; bottom:0) остаётся внизу, а клавиатура наезжает сверху.
        // Контейнер iframe привязан к верху и к nav, его высота автоматически подстраивается под body.
        
        let stableViewportHeight = window.innerHeight;   // физическая высота экрана без клавиатуры
        let isKeyboardOpen = false;
        let resizeTimer = null;
        
        // Функция, которая "замораживает" высоту body и пересчитывает размещение контейнера iframe
        function freezeBodyHeight(forceUpdate = false) {
            const currentHeight = window.innerHeight;
            const heightDiff = Math.abs(currentHeight - stableViewportHeight);
            
            // Если разница больше 100px — это клавиатура (на большинстве устройств)
            if (!forceUpdate && heightDiff > 100) {
                isKeyboardOpen = true;
                // Высота body НЕ МЕНЯЕТСЯ, сохраняем стабильную высоту
                // Это значит, что nav остаётся внизу под клавиатурой — именно то, что нужно
                return;
            }
            
            // Если разница мала (< 80px) или принудительно (поворот экрана) — обновляем стабильную высоту
            if (forceUpdate || heightDiff <= 80) {
                if (isKeyboardOpen && heightDiff <= 80) {
                    isKeyboardOpen = false;
                }
                stableViewportHeight = currentHeight;
                // Применяем жёсткую высоту к body (игнорируя клавиатуру в дальнейшем)
                document.body.style.height = stableViewportHeight + 'px';
                // Пересчитываем bottom для контейнера iframe (он должен быть относительно nav)
                const navHeight = 56;
                const container = document.getElementById('windowContainer');
                if (container) {
                    container.style.bottom = navHeight + 'px';
                }
            }
        }
        
        // Обработчик изменения размеров окна (ресайз) — отличаем клавиатуру от поворота
        function onResize() {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const currentWidth = window.innerWidth;
                const storedWidth = window.__storedWidth || currentWidth;
                const isOrientationChange = Math.abs(currentWidth - storedWidth) > 100;
                window.__storedWidth = currentWidth;
                
                if (isOrientationChange) {
                    // Поворот экрана: обновляем высоту принудительно
                    stableViewportHeight = window.innerHeight;
                    freezeBodyHeight(true);
                } else {
                    // Обычное изменение (клавиатура) — игнорируем, body не трогаем
                    freezeBodyHeight(false);
                }
            }, 40);
        }
        
        // ---- Блокировка любых прокруток страницы, мешающих интерфейсу ----
        function disableBodyScroll() {
            document.body.addEventListener('touchmove', function(e) {
                // Если цель внутри iframe — пропускаем, иначе блокируем
                if (e.target && e.target.closest && e.target.closest('iframe')) {
                    return;
                }
                e.preventDefault();
            }, { passive: false });
            
            document.body.addEventListener('wheel', function(e) {
                if (!e.target.closest('iframe')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
        
        // ---- Инициализация Telegram WebApp и локализация ----
        let tg = null;
        let userLang = 'en';
        
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#0c1017');
                tg.setBackgroundColor('#0c1017');
                if (typeof tg.disableVerticalSwipes === 'function') {
                    tg.disableVerticalSwipes();
                }
                if (tg.initDataUnsafe?.user?.language_code) {
                    userLang = tg.initDataUnsafe.user.language_code.toLowerCase();
                }
            }
        } catch(e) { console.warn("Telegram WebApp not available"); }
        
        const i18n = {
            uk: { crypto: "Термінал", note: "Блокнот" },
            ru: { crypto: "Терминал", note: "Блокнот" },
            en: { crypto: "Terminal", note: "Notepad" }
        };
        const langPack = i18n[userLang] || i18n['en'];
        
        // URL приложений (рабочие)
        const APP_URLS = {
            crypto: "https://amigo-crypto.netlify.app",
            note: "https://amigo-note.netlify.app"
        };
        
        // Загрузка iframe (ленивая, без конфликтов)
        function loadIframe(id, url) {
            const iframe = document.getElementById(id);
            if (!iframe) return;
            if (iframe.src && iframe.src !== 'about:blank') return;
            iframe.src = url;
            iframe.onerror = () => {
                iframe.srcdoc = '<html style="background:#0c1017; color:#fff; display:flex; align-items:center; justify-content:center; font-family:system-ui;"><div>⚠️ Connection error<br>Tap to retry</div></html>';
            };
        }
        
        // Переключение между окнами с тактильной отдачей
        function switchWindow(windowId, btnElement) {
            if (btnElement && btnElement.classList.contains('active')) return;
            
            if (tg && tg.HapticFeedback) {
                try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
            }
            
            // Переключение iframe
            document.querySelectorAll('iframe').forEach(iframe => iframe.classList.remove('active'));
            const targetFrame = document.getElementById(`win-${windowId}`);
            if (targetFrame) targetFrame.classList.add('active');
            
            // Активная кнопка
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            // Ленивая загрузка, если ещё не загружено
            if (windowId === 'crypto' && (!document.getElementById('win-crypto').src || document.getElementById('win-crypto').src === 'about:blank')) {
                loadIframe('win-crypto', APP_URLS.crypto);
            } else if (windowId === 'note' && (!document.getElementById('win-note').src || document.getElementById('win-note').src === 'about:blank')) {
                loadIframe('win-note', APP_URLS.note);
            }
        }
        
        // Установка текста на кнопки
        function setButtonLabels() {
            const cryptoLabel = document.getElementById('text-crypto');
            const noteLabel = document.getElementById('text-note');
            if (cryptoLabel) cryptoLabel.innerText = langPack.crypto;
            if (noteLabel) noteLabel.innerText = langPack.note;
        }
        
        // ---- ГЛАВНЫЙ ЗАПУСК ----
        window.addEventListener('DOMContentLoaded', () => {
            // Фиксируем высоту body один раз (игнорируем клавиатуру)
            freezeBodyHeight(true);
            setButtonLabels();
            
            // Предзагрузка первого окна и ленивая загрузка второго
            loadIframe('win-crypto', APP_URLS.crypto);
            setTimeout(() => {
                if (!document.getElementById('win-note').src || document.getElementById('win-note').src === 'about:blank') {
                    loadIframe('win-note', APP_URLS.note);
                }
            }, 500);
            
            // Слушаем изменения размеров окна (повороты и клавиатуру — фильтруем)
            window.addEventListener('resize', onResize);
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    stableViewportHeight = window.innerHeight;
                    freezeBodyHeight(true);
                }, 30);
            });
            
            // Блокировка скроллов страницы
            disableBodyScroll();
            
            // Обработчики кнопок
            const cryptoBtn = document.getElementById('btn-crypto');
            const noteBtn = document.getElementById('btn-note');
            
            cryptoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchWindow('crypto', cryptoBtn);
            });
            noteBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchWindow('note', noteBtn);
            });
            
            // Если Telegram WebApp активен, расширяем на весь экран
            if (tg && typeof tg.expand === 'function') tg.expand();
            
            // Дополнительная защита: если фокус внутри iframe, запрещаем скролл родителя
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                iframe.addEventListener('focus', () => {
                    window.scrollTo(0, 0);
                });
            });
        });
        
        // Экспорт для возможной отладки
        window.__fixKeyboardAmigo = () => freezeBodyHeight(true);
    })();
</script>
</body>
</html>
