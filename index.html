<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: меняем interactive-widget на resizes-visual,
         чтобы клавиатура НЕ изменяла размеры окна (layout viewport) 
         и fixed-навигация оставалась внизу экрана, не поднимаясь вместе с клавиатурой -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
    <meta name="theme-color" content="#0c1017">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Amigo Hub — Terminal & Notepad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Глобальный сброс — никаких случайных выделений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0c1017;
            --nav-bg: rgba(17, 21, 29, 0.92);
            --nav-border: #1f242c;
            --text-muted: #8e9eae;
            --accent: #3b82f6;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: 56px;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #0c1017;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер окон — абсолютное позиционирование, высота задаётся JS, но клавиатура его не сжимает */
        .window-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            overflow: hidden;
            z-index: 1;
            background-color: var(--bg-color);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            background-color: var(--bg-color);
        }

        iframe.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* Навигация — всегда внизу экрана, клавиатура её не поднимает (благодаря meta interactive-widget=resizes-visual) */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            padding-bottom: var(--safe-bottom);
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--nav-border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 8px;
            box-sizing: content-box;
        }

        .nav-tab {
            flex: 1;
            max-width: 130px;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            border-radius: 12px;
        }

        .nav-tab:active {
            transform: scale(0.96);
        }

        .nav-tab.active {
            color: var(--accent);
        }

        .nav-tab svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-tab.active svg {
            transform: translateY(-2px);
        }

        /* Скрываем скроллбары */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="window-container" id="windowContainer">
    <iframe id="win-crypto" class="active"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"
            title="Crypto Terminal"
            loading="eager"></iframe>

    <iframe id="win-note"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"
            title="Secure Notepad"
            loading="lazy"></iframe>
</div>

<nav>
    <button id="btn-crypto" class="nav-tab active" data-window="crypto">
        <svg viewBox="0 0 24 24">
            <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L3 15.17l1.5 1.32z"/>
        </svg>
        <span id="text-crypto">Terminal</span>
    </button>
    <button id="btn-note" class="nav-tab" data-window="note">
        <svg viewBox="0 0 24 24">
            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
        </svg>
        <span id="text-note">Notepad</span>
    </button>
</nav>

<script>
    (function() {
        // ---- Теперь, благодаря interactive-widget=resizes-visual, клавиатура не меняет layout viewport,
        //     и fixed-панель остаётся внизу. Оставшийся JS нужен только для корректной работы iframe и адаптации под повороты.
        
        const container = document.getElementById('windowContainer');
        const NAV_HEIGHT = 56;
        
        let stableViewportHeight = window.innerHeight;
        
        function updateContainerHeight() {
            // Высота контейнера = полная высота окна минус высота навигации
            let targetHeight = window.innerHeight - NAV_HEIGHT;
            if (targetHeight < 80) targetHeight = 80;
            container.style.height = targetHeight + 'px';
        }
        
        function onResizeOrRotate() {
            // При повороте экрана или изменении размера (без клавиатуры) обновляем высоту контейнера
            stableViewportHeight = window.innerHeight;
            updateContainerHeight();
        }
        
        // Блокировка скролла на родителе, но внутри iframe скролл работает
        function preventBodyScroll() {
            document.body.addEventListener('touchmove', function(e) {
                if (e.target.closest && !e.target.closest('iframe')) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            document.body.addEventListener('wheel', function(e) {
                if (!e.target.closest('iframe')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
        
        // Telegram WebApp инициализация
        let tg = null;
        let userLang = 'en';
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                tg.setHeaderColor('#0c1017');
                tg.setBackgroundColor('#0c1017');
                if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
                if (tg.initDataUnsafe?.user?.language_code) {
                    userLang = tg.initDataUnsafe.user.language_code.toLowerCase();
                }
            }
        } catch(e) { /* Тихо падаем */ }
        
        const i18nMap = {
            uk: { crypto: "Термінал", note: "Блокнот" },
            ru: { crypto: "Терминал", note: "Блокнот" },
            en: { crypto: "Terminal", note: "Notepad" }
        };
        const langPack = i18nMap[userLang] || i18nMap['en'];
        
        const APP_URLS = {
            crypto: "https://amigo-crypto.netlify.app",
            note: "https://amigo-note.netlify.app"
        };
        
        function loadIframe(id, url) {
            const iframe = document.getElementById(id);
            if (!iframe) return;
            if (iframe.src && iframe.src !== 'about:blank') return;
            iframe.src = url;
            iframe.onerror = () => {
                iframe.srcdoc = '<html style="background:#0c1017; color:#fff; display:flex; align-items:center; justify-content:center; font-family:system-ui;"><div>⚠️ Ошибка соединения<br>Нажмите для повтора</div></html>';
            };
        }
        
        function switchToWindow(windowId, btnElement) {
            if (btnElement && btnElement.classList.contains('active')) return;
            
            if (tg && tg.HapticFeedback) {
                try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
            }
            
            document.querySelectorAll('iframe').forEach(iframe => iframe.classList.remove('active'));
            const targetIframe = document.getElementById(`win-${windowId}`);
            if (targetIframe) targetIframe.classList.add('active');
            
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            if (windowId === 'crypto' && (!document.getElementById('win-crypto').src || document.getElementById('win-crypto').src === 'about:blank')) {
                loadIframe('win-crypto', APP_URLS.crypto);
            } else if (windowId === 'note' && (!document.getElementById('win-note').src || document.getElementById('win-note').src === 'about:blank')) {
                loadIframe('win-note', APP_URLS.note);
            }
        }
        
        function updateButtonTexts() {
            const cryptoLabel = document.getElementById('text-crypto');
            const noteLabel = document.getElementById('text-note');
            if (cryptoLabel) cryptoLabel.innerText = langPack.crypto;
            if (noteLabel) noteLabel.innerText = langPack.note;
        }
        
        // Главная инициализация
        window.addEventListener('DOMContentLoaded', () => {
            updateButtonTexts();
            updateContainerHeight();
            
            // Предзагрузка iframe
            loadIframe('win-crypto', APP_URLS.crypto);
            setTimeout(() => {
                if (!document.getElementById('win-note').src || document.getElementById('win-note').src === 'about:blank') {
                    loadIframe('win-note', APP_URLS.note);
                }
            }, 400);
            
            window.addEventListener('resize', onResizeOrRotate);
            window.addEventListener('orientationchange', () => {
                setTimeout(onResizeOrRotate, 30);
            });
            
            preventBodyScroll();
            
            const cryptoBtn = document.getElementById('btn-crypto');
            const noteBtn = document.getElementById('btn-note');
            cryptoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchToWindow('crypto', cryptoBtn);
            });
            noteBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchToWindow('note', noteBtn);
            });
            
            if (tg && typeof tg.expand === 'function') tg.expand();
        });
        
        // Дополнительная коррекция после полной загрузки iframe
        window.addEventListener('load', () => {
            updateContainerHeight();
        });
    })();
</script>
</body>
</html>
