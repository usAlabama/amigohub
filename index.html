<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
    <meta name="theme-color" content="#0c1017">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Amigo Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c1017;
            --nav-bg: #11151d;
            --nav-border: #1f242c;
            --text-muted: #576575;
            --accent: #2962ff;
            
            --app-height: 100vh; 
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: calc(48px + var(--safe-bottom));
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--nav-bg) !important;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: var(--app-height);
            min-height: var(--app-height);
            max-height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
        }

        .window-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: calc(var(--app-height) - var(--nav-height));
            background-color: var(--bg-color);
            overflow: hidden;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease-in-out;
            background-color: var(--bg-color);
        }

        iframe.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        nav {
            position: absolute;
            top: calc(var(--app-height) - var(--nav-height));
            left: 0;
            right: 0;
            height: var(--nav-height);
            padding-bottom: var(--safe-bottom);
            background: rgba(17, 21, 29, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--nav-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            z-index: 10;
            gap: 4px;
        }

        .nav-tab {
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s, transform 0.1s;
            max-width: 120px;
        }

        .nav-tab:active {
            transform: scale(0.95);
        }

        .nav-tab.active {
            color: var(--accent);
        }

        .nav-tab svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-tab.active svg {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="window-container">
        <iframe id="win-crypto" class="active" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>
        
        <iframe id="win-note" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>

        <iframe id="win-module" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>
    </div>

    <nav>
        <button id="btn-crypto" class="nav-tab active" onclick="switchWindow('crypto', this)">
            <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L3 15.17l1.5 1.32z"/></svg>
            <span id="text-crypto">Terminal</span>
        </button>

        <button id="btn-note" class="nav-tab" onclick="switchWindow('note', this)">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span id="text-note">Notepad</span>
        </button>

        <button id="btn-module" class="nav-tab" onclick="switchWindow('module', this)">
            <svg viewBox="0 0 24 24"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/></svg>
            <span id="text-module">Module</span>
        </button>
    </nav>

    <script>
        const APP_URLS = {
            crypto: "https://usalabama.github.io/amigocryptoterminal/",
            note:   "https://usalabama.github.io/amigo-note/",
            module: "https://usalabama.github.io/qwentest/"
        };

        let tg = null;
        let userLang = 'en';

        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0c1017');
            tg.setBackgroundColor('#0c1017');
            if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); 
            
            if (tg.initDataUnsafe?.user?.language_code) {
                userLang = tg.initDataUnsafe.user.language_code.toLowerCase();
            }
        }

        function freezeAppLayout() {
            setTimeout(() => {
                const fixedHeight = window.innerHeight;
                document.documentElement.style.setProperty('--app-height', `${fixedHeight}px`);
            }, 300);
        }

        const i18n = {
            uk: { crypto: "Термінал",  note: "Блокнот",  module: "Модуль"   },
            ru: { crypto: "Терминал",  note: "Блокнот",  module: "Модуль"   },
            en: { crypto: "Terminal",  note: "Notepad",  module: "Module"   },
            es: { crypto: "Terminal",  note: "Bloc",     module: "Módulo"   },
            de: { crypto: "Terminal",  note: "Notizblock", module: "Modul"  },
            fr: { crypto: "Terminal",  note: "Bloc-notes", module: "Module" },
            zh: { crypto: "终端",      note: "记事本",   module: "模块"     },
            ja: { crypto: "ターミナル", note: "メモ帳",   module: "モジュール" },
            ko: { crypto: "터미널",    note: "메모장",   module: "모듈"     }
        };

        const t = i18n[userLang] || i18n['en'];

        window.addEventListener('DOMContentLoaded', () => {
            freezeAppLayout();

            document.getElementById('text-crypto').innerText = t.crypto;
            document.getElementById('text-note').innerText   = t.note;
            document.getElementById('text-module').innerText = t.module;

            document.getElementById('win-crypto').src = APP_URLS.crypto;

            setTimeout(() => {
                document.getElementById('win-note').src = APP_URLS.note;
            }, 500);

            setTimeout(() => {
                document.getElementById('win-module').src = APP_URLS.module;
            }, 1000);
        });

        function switchWindow(windowId, btn) {
            if (btn.classList.contains('active')) return;

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            document.querySelectorAll('iframe').forEach(frame => frame.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(`win-${windowId}`).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
