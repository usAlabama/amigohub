<!-- ФАЙЛ 1: index.html (Amigo Hub) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0c1017">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Amigo Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c1017;
            --nav-bg: #11151d;
            --nav-border: #1f242c;
            --text-muted: #576575;
            --accent: #2962ff;
            /* 2026 Trend: Dynamic Viewport Height for perfect mobile fit without white bars */
            --app-height: 100dvh; 
            /* Safe area for iOS bottom bar */
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: calc(48px + var(--safe-bottom));
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--nav-bg) !important;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            position: fixed;
            overscroll-behavior: none; /* Prevents pull-to-refresh bounce */
            -webkit-font-smoothing: antialiased;
        }

        /* Изолированный контейнер для iframe */
        .window-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: var(--nav-height);
            background-color: var(--bg-color);
            overflow: hidden;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease-in-out;
            background-color: var(--bg-color);
        }

        iframe.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* Современная ультра-тонкая навигация */
        nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            padding-bottom: var(--safe-bottom);
            background: rgba(17, 21, 29, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--nav-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            z-index: 10;
            gap: 4px;
        }

        .nav-tab {
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s, transform 0.1s;
            max-width: 120px;
        }

        .nav-tab:active {
            transform: scale(0.95);
        }

        .nav-tab.active {
            color: var(--accent);
        }

        .nav-tab svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .nav-tab.active svg {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="window-container">
        <!-- Sandboxed iframes для безопасности и независимости. Упадет один - другие работают. -->
        <iframe id="win-crypto" class="active" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>
        
        <iframe id="win-note" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>
        
        <!-- Задел под 3-й модуль -->
        <!--
        <iframe id="win-tools" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms" 
                loading="lazy"></iframe>
        -->
    </div>

    <nav>
        <button id="btn-crypto" class="nav-tab active" onclick="switchWindow('crypto', this)">
            <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L3 15.17l1.5 1.32z"/></svg>
            <span id="text-crypto">Terminal</span>
        </button>

        <!-- Задел под 3-ю кнопку в центре (Инструменты / Портфолио / Новости) -->
        <!--
        <button id="btn-tools" class="nav-tab" onclick="switchWindow('tools', this)">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2z"/></svg>
            <span id="text-tools">Tools</span>
        </button>
        -->

        <button id="btn-note" class="nav-tab" onclick="switchWindow('note', this)">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span id="text-note">Notepad</span>
        </button>
    </nav>

    <script>
        // ЛЕГКАЯ ЗАМЕНА ХОСТИНГА (Netlify -> Github Pages и т.д.)
        const APP_URLS = {
            crypto: "https://usalabama.github.io/amigocryptoterninal/",
            note: "https://usalabama.github.io/amigo-note/",
            // tools: "https://amigo-tools.netlify.app" // Для будущей 3-й кнопки
        };

        // Инициализация Telegram WebApp
        let tg = null;
        let userLang = 'en';

        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0c1017');
            tg.setBackgroundColor('#0c1017');
            tg.disableVerticalSwipes(); // Trend 2026: предотвращение случайных закрытий свайпом
            
            if (tg.initDataUnsafe?.user?.language_code) {
                userLang = tg.initDataUnsafe.user.language_code.toLowerCase();
            }
        }

        // Продвинутая система локализации
        const i18n = {
            uk: { crypto: "Термінал", note: "Блокнот", tools: "Сервіси" },
            ru: { crypto: "Терминал", note: "Блокнот", tools: "Сервисы" },
            en: { crypto: "Terminal", note: "Notepad", tools: "Tools" }
        };

        const t = i18n[userLang] || i18n['en'];

        // Загрузка источников и текста
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('text-crypto').innerText = t.crypto;
            document.getElementById('text-note').innerText = t.note;
            // if(document.getElementById('text-tools')) document.getElementById('text-tools').innerText = t.tools;

            // Отложенная загрузка для ускорения первичного рендера Hub'а
            document.getElementById('win-crypto').src = APP_URLS.crypto;
            setTimeout(() => {
                document.getElementById('win-note').src = APP_URLS.note;
                // document.getElementById('win-tools').src = APP_URLS.tools;
            }, 500);
        });

        // Логика переключения с оптимизацией DOM
        function switchWindow(windowId, btn) {
            // Если кнопка уже активна - ничего не делаем
            if(btn.classList.contains('active')) return;

            // Обратная связь TWA
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            // Прячем все
            document.querySelectorAll('iframe').forEach(frame => frame.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            
            // Показываем нужное
            document.getElementById(`win-${windowId}`).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
